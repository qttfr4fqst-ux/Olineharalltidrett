const loadingTexts=[

async function fakeLoading(loadId,barId){

const load=document.getElementById(loadId);
const bar=document.getElementById(barId);

bar.style.width="0%";

for(let i=0;i<loadingTexts.length;i++){

load.innerHTML=loadingTexts[i];

bar.style.width=((i+1)/loadingTexts.length*100)+"%";

await new Promise(r=>setTimeout(r,800));

}

}

/* RANDOM SMALL POPUP */

function randomSmallPopup(){

let currentSection = "main";

if(
document.getElementById("archive") &&
!document.getElementById("archive").classList.contains("hidden")
){
currentSection = "archive";
}

if(
document.getElementById("theories") &&
!document.getElementById("theories").classList.contains("hidden")
){
currentSection = "archive";
}

let popupArray =
currentSection === "archive"
? smallArchivePopups
: smallMainPopups;

let randomMessage;

do{

randomMessage =
popupArray[
Math.floor(Math.random()*popupArray.length)
];

}while(randomMessage === lastSmallPopup);

lastSmallPopup = randomMessage;

createSmallPopup(randomMessage);

}
