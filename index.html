<!DOCTYPE html>

<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oline’s Analyseinstitutt</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
padding:20px;
background:linear-gradient(-45deg,#f6b8ff,#c7d6ff,#e3c8ff,#ffd5ef);
background-size:400% 400%;
animation:bgFlow 18s ease infinite;
}

@keyframes bgFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:760px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.16);
padding:32px;
border-radius:32px;
box-shadow:0 0 35px rgba(255,255,255,0.10),0 0 70px rgba(255,255,255,0.05);
margin-top:20px;
animation:fadeIn 0.8s ease;
}

.archiveCard{
background:rgba(255,255,255,0.07);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(14px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.mainTitle{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.instituttTitle{
font-family:'Cormorant Garamond',serif;
font-size:3rem;
line-height:1.1;
}

.subtitle{
margin-top:24px;
text-align:center;
font-size:1.05rem;
line-height:1.6;
}

.introText{
margin-top:36px;
text-align:center;
}

.introTitle{
font-size:1.05rem;
margin-bottom:14px;
}

.bullets{
display:flex;
flex-direction:column;
gap:8px;
font-size:1.15rem;
}

.online{
margin-top:34px;
text-align:center;
font-size:0.95rem;
opacity:0.92;
}

.modeTitle{
margin-top:34px;
margin-bottom:28px;
text-align:center;
font-size:1.4rem;
font-weight:700;
letter-spacing:4px;
}

button{
width:100%;
border:none;
padding:18px;
margin-top:15px;
border-radius:22px;
cursor:pointer;
font-size:1rem;
font-weight:500;
color:white;
transition:0.3s;
background:linear-gradient(45deg,#ff7ed8,#9db7ff);
box-shadow:0 0 18px rgba(255,255,255,0.14);
}

button:hover{
transform:translateY(-2px);
}

.archiveButton{
background:linear-gradient(45deg,rgba(130,130,150,0.55),rgba(100,100,130,0.55));
}

.secondaryButton{
background:rgba(255,255,255,0.14);
}

.sectionTitle{
font-family:'Cormorant Garamond',serif;
font-size:2.2rem;
margin-bottom:24px;
text-align:center;
}

input,
textarea,
select{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:18px;
font-size:1rem;
font-family:'Poppins',sans-serif;
background:rgba(255,255,255,0.88);
color:#444;
}

textarea{
min-height:120px;
resize:none;
}

.result{
margin-top:28px;
line-height:1.8;
font-size:1.1rem;
}

.loading{
margin-top:20px;
text-align:center;
font-size:1rem;
min-height:28px;
}

.progress{
width:100%;
height:12px;
border-radius:30px;
overflow:hidden;
background:rgba(255,255,255,0.16);
margin-top:18px;
}

.bar{
height:100%;
width:0%;
background:white;
transition:1s;
}

.hidden{
display:none;
}

.sparkle{
position:fixed;
font-size:18px;
pointer-events:none;
opacity:0.7;
animation:sparkleFloat linear infinite;
}

@keyframes sparkleFloat{
from{
transform:translateY(105vh);
}

to{
transform:translateY(-10vh);
}
}

.logEntry{
margin-top:18px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.06);
line-height:1.7;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,
td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.10);
}

.footer{
margin-top:40px;
text-align:center;
font-size:0.85rem;
opacity:0.72;
}

@keyframes tickerMove{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

@keyframes newsFloat{
0%{transform:translateY(0px);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0px);}
}

.instituteNewsCard{
background:rgba(255,255,255,0.38);
backdrop-filter:blur(10px);
padding:24px;
border-radius:28px;
margin-bottom:22px;
box-shadow:0 0 22px rgba(0,0,0,0.08);
border:1px solid rgba(255,255,255,0.18);
animation:newsFade 0.5s ease;
}

@keyframes newsFade{
from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0px);
}
}

.newsCategory{
font-size:0.86rem;
font-weight:700;
letter-spacing:1px;
opacity:0.72;
margin-bottom:10px;
}

.newsTitle{
font-size:1.5rem;
font-weight:700;
margin-bottom:12px;
color:#24435a;
line-height:1.3;
}

.newsContent{
line-height:1.7;
font-size:1rem;
}
</style>

</head>

<body>

<div class="container">
<div class="card">
<h1 class="mainTitle">
<div class="instituttTitle">Oline’s Analyseinstitutt</div>
<div style="font-size:2rem; margin-top:10px;">🦋</div>
</h1>

<div class="subtitle">
✨ Uavhengig vurdering av diskusjoner siden 2004 ✨
</div>

<button onclick="openInstituteNews()">
Åpne instituttavisen
</button>
</div>
</div>

<script>

function openInstituteNews(){

const existing = document.getElementById("newsOverlay");

if(existing){
existing.remove();
}

const overlay = document.createElement("div");

overlay.id = "newsOverlay";

overlay.style.cssText = `
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:auto;
z-index:999999;
padding:28px 18px;
background:linear-gradient(180deg,#b8d8d0,#adc7dc,#c5c0ea);
`;

overlay.innerHTML = `
<div style="
max-width:820px;
margin:auto;
font-family:Poppins,sans-serif;
color:#1f2937;
">

<div style="
text-align:center;
margin-bottom:30px;
">

<div style="
font-size:3rem;
animation:newsFloat 3s ease-in-out infinite;
">
📰✨
</div>

<h1 style="
font-family:Cormorant Garamond,serif;
font-size:3.4rem;
margin-top:12px;
color:#24435a;
">
Instituttavisen
</h1>

<div style="
opacity:0.75;
margin-top:8px;
">
Dagens interne nyhetsrapport
</div>

</div>

<div style="
background:rgba(255,255,255,0.35);
padding:14px 18px;
border-radius:18px;
margin-bottom:28px;
font-weight:600;
overflow:hidden;
white-space:nowrap;
">

<div style="
display:inline-block;
animation:tickerMove 16s linear infinite;
">
⚠ BREAKING NEWS ✨
Praktikanten vurderer oppsigelse ✨
Instituttet observerer økning i dårlige argumenter ✨
</div>

</div>

<div id="instituteNewsFeed"></div>

<button onclick="closeInstituteNews()" style="
width:100%;
margin-top:30px;
padding:18px;
border:none;
border-radius:22px;
background:#24435a;
color:white;
font-size:1rem;
cursor:pointer;
">
Lukk avis
</button>

</div>
`;

document.body.appendChild(overlay);

const feed = document.getElementById("instituteNewsFeed");

const articles = [
{
category:"⚠ BREAKING NEWS",
title:"Tre nye klager avvist siste time",
content:"Instituttet rapporterer om økning i brukere som nekter å godta analyseresultater."
},
{
category:"🧠 FORSKNING",
title:"Ny studie om lav batteriprosent",
content:"Intern forskning peker mot dramatisk dårligere beslutningstaking ved lav batteriprosent."
},
{
category:"🏛 INTERN GOSSIP",
title:"IT-support vurderer oppsigelse",
content:"Frontend-parseren ble observert gråtende i et hjørne."
}
];

articles.forEach(article => {

const card = document.createElement("div");

card.className = "instituteNewsCard";

card.innerHTML = `
<div class="newsCategory">${article.category}</div>
<div class="newsTitle">${article.title}</div>
<div class="newsContent">${article.content}</div>
`;

feed.appendChild(card);

});

}

function closeInstituteNews(){

const overlay = document.getElementById("newsOverlay");

if(overlay){
overlay.remove();
}

}

window.addEventListener("error", function(e){
console.log("SYSTEMFEIL:", e.message);
});

</script>

</body>
</html>
